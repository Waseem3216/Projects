<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="470" viewBox="0 0 1500 470" role="img" aria-label="Waseem Resume Desktop banner">
  <defs>
    <linearGradient id="desktop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f6da5"/>
      <stop offset="100%" stop-color="#102452"/>
    </linearGradient>
    <linearGradient id="titlebar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000080"/>
      <stop offset="100%" stop-color="#102452"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="7" dy="7" stdDeviation="0" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <rect width="28" height="28" fill="transparent"/>
      <circle cx="3" cy="3" r="1" fill="#ffffff" opacity="0.15"/>
    </pattern>
  </defs>

  <rect width="1500" height="470" fill="url(#desktop)"/>
  <rect width="1500" height="470" fill="url(#dots)" opacity="0.65"/>

  <g transform="translate(82 58)" filter="url(#shadow)">
    <rect width="1336" height="342" fill="#c0c0c0" stroke="#ffffff" stroke-width="3"/>
    <path d="M0 0H1336V342H0Z" fill="none" stroke="#404040" stroke-width="3" transform="translate(4 4)"/>
    <rect x="8" y="8" width="1320" height="42" fill="url(#titlebar)"/>
    <text x="28" y="36" font-family="Tahoma, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">▣ Program Manager - Waseem Sayyedahmad</text>
    <g transform="translate(1215 15)">
      <rect width="28" height="24" fill="#c0c0c0" stroke="#ffffff"/>
      <text x="14" y="17" text-anchor="middle" font-family="Tahoma, Arial" font-size="17" font-weight="700" fill="#000000">-</text>
      <rect x="36" width="28" height="24" fill="#c0c0c0" stroke="#ffffff"/>
      <text x="50" y="18" text-anchor="middle" font-family="Tahoma, Arial" font-size="15" font-weight="700" fill="#000000">□</text>
      <rect x="72" width="28" height="24" fill="#c0c0c0" stroke="#ffffff"/>
      <text x="86" y="18" text-anchor="middle" font-family="Tahoma, Arial" font-size="16" font-weight="700" fill="#000000">×</text>
    </g>
    <rect x="8" y="50" width="1320" height="30" fill="#c0c0c0" stroke="#808080"/>
    <text x="28" y="71" font-family="Tahoma, Arial" font-size="16" fill="#000000">List</text>
    <text x="92" y="71" font-family="Tahoma, Arial" font-size="16" fill="#000000">Contact</text>
    <text x="182" y="71" font-family="Tahoma, Arial" font-size="16" fill="#000000">Tools</text>

    <rect x="36" y="108" width="820" height="202" fill="#ffffff" stroke="#404040" stroke-width="3"/>
    <text x="62" y="150" font-family="Tahoma, Arial" font-size="44" font-weight="700" fill="#000000">Waseem Sayyedahmad</text>
    <text x="64" y="192" font-family="Tahoma, Arial" font-size="24" fill="#111111">CIS student focused on IAM, automation, cloud, data dashboards,</text>
    <text x="64" y="225" font-family="Tahoma, Arial" font-size="24" fill="#111111">IT operations, and enterprise systems support.</text>
    <g font-family="Tahoma, Arial" font-size="18" font-weight="700">
      <rect x="64" y="258" width="155" height="34" fill="#e8e8e8" stroke="#808080"/>
      <text x="142" y="281" text-anchor="middle" fill="#000080">Experience</text>
      <rect x="236" y="258" width="145" height="34" fill="#e8e8e8" stroke="#808080"/>
      <text x="309" y="281" text-anchor="middle" fill="#000080">Projects</text>
      <rect x="398" y="258" width="120" height="34" fill="#e8e8e8" stroke="#808080"/>
      <text x="458" y="281" text-anchor="middle" fill="#000080">Skills</text>
      <rect x="535" y="258" width="175" height="34" fill="#e8e8e8" stroke="#808080"/>
      <text x="623" y="281" text-anchor="middle" fill="#000080">Full Resume</text>
    </g>

    <rect x="902" y="108" width="390" height="202" fill="#c0c0c0" stroke="#404040" stroke-width="3"/>
    <rect x="920" y="126" width="354" height="44" fill="#000080"/>
    <text x="1097" y="155" text-anchor="middle" font-family="Tahoma, Arial" font-size="22" font-weight="700" fill="#ffffff">System Monitor</text>
    <rect x="934" y="192" width="326" height="24" fill="#000000" stroke="#ffffff"/>
    <rect x="936" y="194" width="314" height="20" fill="#00ff00" opacity="0.78"/>
    <text x="946" y="247" font-family="Tahoma, Arial" font-size="18" font-weight="700" fill="#000000">Profile Loaded: WASEEM.EXE / READY</text>
    <text x="946" y="278" font-family="Tahoma, Arial" font-size="18" fill="#000000">Themes: Classic · Midnight · Terminal</text>
  </g>

  <g font-family="Tahoma, Arial" font-size="16" font-weight="700" fill="#ffffff">
    <text x="92" y="433">▣ Static HTML/CSS/JS</text>
    <text x="330" y="433">▣ Retro Desktop UI</text>
    <text x="565" y="433">▣ Indexed Resume Search</text>
    <text x="835" y="433">▣ Command Palette</text>
    <text x="1062" y="433">▣ PWA Manifest</text>
    <text x="1282" y="433">▣ Resume PDF</text>
  </g>
</svg>
